name: Node.js CI

on:
  push:

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce_test

        ports:
          - 5432:5432

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        env:
          PGUSER: postgres
          PGHOST: localhost
          PGDATABASE: ecommerce_test
          PGPASSWORD: postgres
          PGPORT: 5432

        run: npm test